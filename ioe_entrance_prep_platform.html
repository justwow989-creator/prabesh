*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:transparent}
.btn{cursor:pointer;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);padding:10px 20px;border-radius:var(--border-radius-md);font-size:14px;font-family:var(--font-sans);transition:background 0.15s,transform 0.1s}
.btn:hover{background:var(--color-background-secondary)}

.btn-primary{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}

.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem}

.badge-correct{background:#EAF3DE;color:#27500A}
.badge-wrong{background:#FCEBEB;color:#791F1F}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes tick{0%{transform:scaleX(1)}50%{transform:scaleX(0.97)}100%{transform:scaleX(1)}}
.animate{animation:fadeUp 0.3s ease forwards}
.opt-btn{width:100%;text-align:left;padding:12px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:14px;cursor:pointer;transition:all 0.15s;font-family:var(--font-sans);display:flex;align-items:center;gap:10px}

.opt-btn.correct{background:#EAF3DE;border-color:#639922;color:#27500A}
.opt-btn.wrong{background:#FCEBEB;border-color:#E24B4A;color:#791F1F}
.opt-btn.reveal{background:#E6F1FB;border-color:#185FA5;color:#042C53}

.prog-bar{height:4px;background:var(--color-background-secondary);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--color-text-primary);border-radius:2px;transition:width 0.4s ease}
.timer-ring{position:relative;width:52px;height:52px;flex-shrink:0}
.timer-ring svg{transform:rotate(-90deg)}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;font-family:var(--font-mono)}
.stat-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:1rem;text-align:center}
.stat-num{font-size:26px;font-weight:500;margin-bottom:2px}

const TOPIC_LABEL = t => t.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function subjectOf(id){return id.startsWith('m')?'math':id.startsWith('p')?'physics':'chemistry'}

function selectQuestions(){
  const tricks=shuffle([...BANK.math,...BANK.physics,...BANK.chemistry].filter(q=>q.d==='trick'));
  const hards=shuffle([...BANK.math,...BANK.physics,...BANK.chemistry].filter(q=>q.d==='hard'));
  const trickQ={...tricks[0],exception:'trick'};
  const hardPool=hards.filter(q=>q.id!==trickQ.id);
  const hardQ={...shuffle(hardPool)[0],exception:'hard'};
  const usedIds=new Set([trickQ.id,hardQ.id]);
  let mCount=4,pCount=3,cCount=3;
  if(subjectOf(trickQ.id)==='math')mCount--;else if(subjectOf(trickQ.id)==='physics')pCount--;else cCount--;
  if(subjectOf(hardQ.id)==='math')mCount--;else if(subjectOf(hardQ.id)==='physics')pCount--;else cCount--;
  const norm=q=>q.d==='normal'&&!usedIds.has(q.id);
  const mNorm=shuffle(BANK.math.filter(norm)).slice(0,mCount);
  const pNorm=shuffle(BANK.physics.filter(norm)).slice(0,pCount);
  const cNorm=shuffle(BANK.chemistry.filter(norm)).slice(0,cCount);
  return shuffle([...mNorm,...pNorm,...cNorm,trickQ,hardQ]);
}

let state={
  screen:'home',
  questions:[],
  currentQ:0,
  selected:null,
  showAnswer:false,
  answers:[],
  qStart:0,
  timeLeft:45,
  results:null,
  attempts:[],
  timerID:null,
  autoID:null,
};

async function loadAttempts(){
  try{const r=await window.storage.get('ioe_attempts');if(r)state.attempts=JSON.parse(r.value);}catch(e){}
  render();
}

function startQuiz(){
  clearInterval(state.timerID);clearTimeout(state.autoID);
  state.questions=selectQuestions();
  state.currentQ=0;state.selected=null;state.showAnswer=false;state.answers=[];
  state.timeLeft=45;state.qStart=Date.now();state.screen='quiz';
  render();startTimer();
}

function startTimer(){
  clearInterval(state.timerID);
  state.timerID=setInterval(()=>{
    state.timeLeft--;
    if(state.timeLeft<=0){clearInterval(state.timerID);handleTimeout();}
    else updateTimer();
  },1000);
}

function updateTimer(){
  const el=document.getElementById('timer-num');
  const arc=document.getElementById('timer-arc');
  if(!el||!arc)return;
  el.textContent=state.timeLeft;
  const r=20,circ=2*Math.PI*r,pct=state.timeLeft/45;
  arc.setAttribute('stroke-dasharray',`${(pct*circ).toFixed(1)} ${circ.toFixed(1)}`);
  const col=state.timeLeft<10?'#E24B4A':state.timeLeft<20?'#BA7517':'#3B6D11';
  arc.setAttribute('stroke',col);el.style.color=col;
}

function handleTimeout(){
  recordAnswer(-1);
}

function handleSelect(idx){
  if(state.showAnswer||state.selected!==null)return;
  clearInterval(state.timerID);
  state.selected=idx;state.showAnswer=true;
  const timeTaken=Math.round((Date.now()-state.qStart)/1000);
  recordAnswer(idx,timeTaken);
}

function recordAnswer(idx,timeTaken){
  timeTaken=timeTaken??Math.max(1,45-state.timeLeft);
  const q=state.questions[state.currentQ];
  const subj=subjectOf(q.id);
  const correct=idx===q.ans;
  state.answers.push({id:q.id,subj,topic:q.topic,selected:idx,correct,timeTaken,exception:q.exception||null});
  state.selected=idx;state.showAnswer=true;
  renderQuizCard();
  state.autoID=setTimeout(()=>{
    if(state.currentQ+1<state.questions.length){
      state.currentQ++;state.selected=null;state.showAnswer=false;state.timeLeft=45;state.qStart=Date.now();
      render();startTimer();
    }else{finishQuiz();}
  },1600);
}

async function finishQuiz(){
  const ans=state.answers;
  const correct=ans.filter(a=>a.correct).length;
  const score=Math.round((correct/ans.length)*100);
  const subjs=['math','physics','chemistry'];
  const subjStats={};
  for(const s of subjs){
    const sa=ans.filter(a=>a.subj===s);
    subjStats[s]={total:sa.length,correct:sa.filter(a=>a.correct).length,
      avgTime:sa.length?Math.round(sa.reduce((x,a)=>x+a.timeTaken,0)/sa.length):0,
      wrongTopics:[...new Set(sa.filter(a=>!a.correct).map(a=>a.topic))]};
  }
  const weakTopics=[...new Set(ans.filter(a=>!a.correct).map(a=>a.topic))];
  const exAns=ans.filter(a=>a.exception);
  const attempt={date:new Date().toISOString(),score,correct,total:ans.length,subjStats,weakTopics,exAns};
  state.results=attempt;
  state.attempts=[...state.attempts,attempt];
  try{await window.storage.set('ioe_attempts',JSON.stringify(state.attempts));}catch(e){}
  state.screen='results';render();
}

function renderQuizCard(){
  const q=state.questions[state.currentQ];
  const labels=['A','B','C','D'];
  document.querySelectorAll('.opt-btn').forEach((btn,i)=>{
    btn.disabled=true;
    if(state.showAnswer){
      if(i===q.ans)btn.className='opt-btn correct';
      else if(i===state.selected&&state.selected!==q.ans)btn.className='opt-btn wrong';
      else btn.className='opt-btn reveal';
    }
  });
}

function render(){
  const app=document.getElementById('app');
  if(state.screen==='home')app.innerHTML=renderHome();
  else if(state.screen==='quiz')app.innerHTML=renderQuiz();
  else if(state.screen==='results')app.innerHTML=renderResults();
  else if(state.screen==='history')app.innerHTML=renderHistory();
  attachEvents();
}

function renderHome(){
  const count=state.attempts.length;
  const best=count?Math.max(...state.attempts.map(a=>a.score)):null;
  const recent=count?state.attempts[count-1]:null;
  return`<div class="screen animate">
    <div style="margin-bottom:1.5rem">
      <div style="font-size:11px;color:var(--color-text-secondary);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px">IOE Entrance Preparation</div>
      <h1 style="font-size:26px;font-weight:500;margin-bottom:6px">Engineering Entrance Quiz</h1>
      <p style="font-size:14px;color:var(--color-text-secondary)">10 questions — Mathematics, Physics &amp; Chemistry — with trick &amp; hard exceptions</p>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem">
      <div class="stat-card"><div class="stat-num">${count}</div><div class="stat-label">Attempts</div></div>
      <div class="stat-card"><div class="stat-num">${best!==null?best+'%':'—'}</div><div class="stat-label">Best score</div></div>
      <div class="stat-card"><div class="stat-num">${recent?recent.score+'%':'—'}</div><div class="stat-label">Last score</div></div>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:1.5rem">
      <button class="btn btn-primary" id="btn-start" style="flex:1;padding:13px">Start quiz ↗</button>
      ${count>0?`<button class="btn" id="btn-history">History</button>`:''}
    </div>
    <div class="card" style="font-size:13px;color:var(--color-text-secondary)">
      <div style="font-weight:500;color:var(--color-text-primary);margin-bottom:8px;font-size:14px">How it works</div>
      <div style="display:flex;flex-direction:column;gap:6px">
        <div>4 Math · 3 Physics · 3 Chemistry, randomized every quiz</div>
        <div>1 <span class="badge badge-trick">⚡ Trick</span> question — don't fall for common misconceptions</div>
        <div>1 <span class="badge badge-hard">🔥 Hard</span> question — tests deeper understanding</div>
        <div>45 seconds per question — time is tracked for analysis</div>
        <div>Weak topics get YouTube + PDF resource links</div>
      </div>
    </div>
  </div>`;
}

function renderQuiz(){
  const q=state.questions[state.currentQ];
  const subj=subjectOf(q.id);
  const labels=['A','B','C','D'];
  const r=20,circ=2*Math.PI*r,pct=state.timeLeft/45;
  const timerCol=state.timeLeft<10?'#E24B4A':state.timeLeft<20?'#BA7517':'#3B6D11';
  return`<div class="screen animate">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="badge ${SUBJ_BADGE[subj]}">${SUBJ_LABEL[subj]}</span>
        ${q.exception==='trick'?`<span class="badge badge-trick">⚡ Trick</span>`:''}
        ${q.exception==='hard'?`<span class="badge badge-hard">🔥 Hard</span>`:''}
      </div>
      <div style="font-size:13px;color:var(--color-text-secondary)">${state.currentQ+1} / ${state.questions.length}</div>
    </div>
    <div class="prog-bar" style="margin-bottom:18px"><div class="prog-fill" style="width:${((state.currentQ)/state.questions.length*100).toFixed(0)}%"></div></div>
    <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:20px">
      <div style="flex:1">
        <p style="font-size:16px;line-height:1.6;font-weight:500">${q.q}</p>
        <div style="font-size:12px;color:var(--color-text-secondary);margin-top:4px">${TOPIC_LABEL(q.topic)}</div>
      </div>
      <div class="timer-ring">
        <svg width="52" height="52" viewBox="0 0 52 52">
          <circle cx="26" cy="26" r="${r}" fill="none" stroke="var(--color-background-secondary)" stroke-width="5"/>
          <circle cx="26" cy="26" r="${r}" fill="none" stroke="${timerCol}" stroke-width="5"
            stroke-dasharray="${(pct*circ).toFixed(1)} ${circ.toFixed(1)}"
            stroke-linecap="round" id="timer-arc"/>
        </svg>
        <div class="timer-num" id="timer-num" style="color:${timerCol}">${state.timeLeft}</div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px" id="opts">
      ${q.opts.map((opt,i)=>`
        <button class="opt-btn" data-idx="${i}">
          <span class="opt-label">${labels[i]}</span>
          <span>${opt}</span>
        </button>`).join('')}
    </div>
  </div>`;
}

function renderResults(){
  const r=state.results;
  const subjs=['math','physics','chemistry'];
  const weakHtml=r.weakTopics.length===0?'<div style="color:var(--color-text-secondary);font-size:14px">All correct! Outstanding work.</div>':
    r.weakTopics.map(t=>{
      const res=RESOURCES[t]||{yt:'https://www.youtube.com/results?search_query=IOE+entrance+'+t,pdf:'https://ioenotes.edu.np/'};
      return`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:0.5px solid var(--color-border-tertiary)">
        <span style="font-size:14px">${TOPIC_LABEL(t)}</span>
        <div style="display:flex;gap:6px">
          <a href="${res.yt}" class="resource-link" target="_blank">▶ YouTube</a>
          <a href="${res.pdf}" class="resource-link" target="_blank">📄 Notes</a>
        </div>
      </div>`;
    }).join('');

  const exHtml=r.exAns.length?r.exAns.map(a=>`
    <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary)">
      <span class="badge ${a.exception==='trick'?'badge-trick':'badge-hard'}">${a.exception==='trick'?'⚡ Trick':'🔥 Hard'}</span>
      <span style="flex:1;font-size:13px;color:var(--color-text-secondary)">${TOPIC_LABEL(a.topic)}</span>
      <span class="badge ${a.correct?'badge-correct':'badge-wrong'}">${a.correct?'Correct':'Wrong'}</span>
    </div>`).join(''):'';

  const trend=state.attempts.length>1?`<div style="font-size:13px;color:var(--color-text-secondary);margin-top:8px;text-align:center">
    ${state.attempts.length>=2?`Previous: ${state.attempts[state.attempts.length-2].score}% → Now: ${r.score}% ${r.score>state.attempts[state.attempts.length-2].score?'↑':'↓'}`:''}
  </div>`:'';

  return`<div class="screen animate">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:42px;font-weight:500;margin-bottom:4px">${r.score}<span style="font-size:22px;color:var(--color-text-secondary)">%</span></div>
      <div style="font-size:15px;color:var(--color-text-secondary)">${r.correct} of ${r.total} correct</div>
      ${trend}
    </div>

    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem">
      ${subjs.map(s=>{const ss=r.subjStats[s];return`<div class="stat-card">
        <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:4px">${SUBJ_LABEL[s].slice(0,4)}</div>
        <div style="font-size:18px;font-weight:500">${ss.correct}/${ss.total}</div>
        <div style="font-size:11px;color:var(--color-text-secondary)">avg ${ss.avgTime}s</div>
      </div>`;}).join('')}
    </div>

    <div class="card" style="margin-bottom:1rem">
      <div style="font-weight:500;font-size:14px;margin-bottom:12px">Subject performance</div>
      ${subjs.map(s=>{const ss=r.subjStats[s];const pct=Math.round((ss.correct/ss.total)*100);return`
        <div class="subj-bar-wrap">
          <div style="display:flex;justify-content:space-between;font-size:13px">
            <span class="badge ${SUBJ_BADGE[s]}">${SUBJ_LABEL[s]}</span>
            <span style="color:var(--color-text-secondary)">${pct}% · avg ${ss.avgTime}s/q</span>
          </div>
          <div class="subj-bar-bg"><div style="height:100%;width:${pct}%;background:${s==='math'?'#185FA5':s==='physics'?'#534AB7':'#3B6D11'};border-radius:4px;transition:width 0.6s ease"></div></div>
        </div>`}).join('')}
    </div>

    ${r.exAns.length?`<div class="card" style="margin-bottom:1rem">
      <div style="font-weight:500;font-size:14px;margin-bottom:10px">Exception questions</div>
      ${exHtml}
    </div>`:''}

    ${r.weakTopics.length?`<div class="card" style="margin-bottom:1rem">
      <div style="font-weight:500;font-size:14px;margin-bottom:10px">Study resources for weak topics</div>
      ${weakHtml}
    </div>`:''}

    <div style="display:flex;gap:10px">
      <button class="btn btn-primary" id="btn-start" style="flex:1;padding:12px">Try again ↗</button>
      <button class="btn" id="btn-history">History</button>
    </div>
  </div>`;
}

function renderHistory(){
  const att=[...state.attempts].reverse();
  const scoreColor=s=>s>=80?'#3B6D11':s>=60?'#BA7517':'#A32D2D';
  return`<div class="screen animate">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:1.25rem">
      <button class="btn" id="btn-home" style="padding:7px 14px;font-size:13px">← Back</button>
      <h2 style="font-size:18px;font-weight:500">Attempt history</h2>
    </div>
    ${att.length===0?`<div class="card" style="text-align:center;color:var(--color-text-secondary);font-size:14px;padding:2rem">No attempts yet. Start your first quiz!</div>`
    :att.map((a,i)=>{
      const d=new Date(a.date);
      const ds=d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
      return`<div class="card" style="margin-bottom:10px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <span style="font-size:13px;color:var(--color-text-secondary)">${ds}</span>
          <span style="font-size:20px;font-weight:500;color:${scoreColor(a.score)}">${a.score}%</span>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${['math','physics','chemistry'].map(s=>{
            const ss=a.subjStats[s];
            return`<span class="badge ${SUBJ_BADGE[s]}">${SUBJ_LABEL[s].slice(0,4)} ${ss.correct}/${ss.total}</span>`;
          }).join('')}
          ${a.weakTopics.slice(0,2).map(t=>`<span class="badge badge-wrong" style="font-size:11px">${TOPIC_LABEL(t).split(' ')[0]}</span>`).join('')}
        </div>
      </div>`;
    }).join('')}
    <button class="btn btn-primary" id="btn-start" style="width:100%;padding:12px;margin-top:10px">Start new quiz ↗</button>
  </div>`;
}

function attachEvents(){
  const on=(id,fn)=>{const el=document.getElementById(id);if(el)el.addEventListener('click',fn)};
  on('btn-start',startQuiz);
  on('btn-history',()=>{state.screen='history';render();});
  on('btn-home',()=>{state.screen='home';render();});
  document.querySelectorAll('.opt-btn').forEach(btn=>{
    btn.addEventListener('click',()=>handleSelect(parseInt(btn.dataset.idx)));
  });
}

loadAttempts();
</script>
